name: No MCP secret files

# Reject any push/PR that commits a local MCP config — these files can carry API
# tokens (e.g. .mcp.json holds bearer tokens). Server-side backstop for where
# GitHub push rulesets can't reach (public repos, Free-plan orgs). Pairs with the
# committed .gitignore. Add this job as a required status check to block merges.
on:
  push:
  pull_request:

jobs:
  block-mcp-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject .mcp.json / .cursor/mcp.json
        run: |
          matches=$(git ls-files | grep -E '(^|/)\.mcp\.json$|(^|/)\.cursor/mcp\.json$' || true)
          if [ -n "$matches" ]; then
            echo "::error::Committed MCP config file(s) detected — these can contain API tokens. Remove them and keep them gitignored:"
            echo "$matches"
            exit 1
          fi
          echo "OK — no MCP config files are tracked."
