name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        laravel: ["10.*", "11.*", "12.*"]
        exclude:
          # Laravel 11 dropped PHP 8.1 support; PHP 8.2 is the floor for all matrix entries
          - php: "8.2"
            laravel: "10.*"
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: zip, mbstring, dom

      - name: Install dependencies (Laravel ${{ matrix.laravel }})
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest --colors=always
